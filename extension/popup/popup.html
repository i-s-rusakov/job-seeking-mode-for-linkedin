<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="livf-modal">
        <div class="livf-header">
            <img src="../icons/icon48.png" alt="LJSM Icon" class="livf-icon">
            <h2 id="settings-title">Language Settings</h2>
        </div>
        <div class="livf-form-group" style="flex-direction: row; align-items: center; justify-content: space-between;">
            <label id="enable-filtering-label" style="margin:0; cursor: pointer;" for="livf-enable-toggle">Enable Job Seeking Mode</label>
            <input type="checkbox" id="livf-enable-toggle" style="width: 18px; height: 18px; cursor: pointer;">
        </div>
        <div class="livf-form-group" style="flex-direction: row; align-items: center; justify-content: space-between;">
            <label id="enable-highlighting-label" style="margin:0; cursor: pointer;" for="livf-highlight-toggle">Highlight keywords</label>
            <input type="checkbox" id="livf-highlight-toggle" style="width: 18px; height: 18px; cursor: pointer;">
        </div>
        <div class="livf-form-group" style="flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 4px;">
            <label id="auto-update-dict-label" style="margin:0; cursor: pointer;" for="livf-auto-update-toggle">Auto-update keywords</label>
            <div style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="livf-auto-update-toggle" style="width: 18px; height: 18px; cursor: pointer;">
                <button id="livf-force-update-btn" style="background: none; border: none; cursor: pointer; font-size: 16px; padding: 0;" title="Force Update">🔄</button>
            </div>
        </div>
        <div style="font-size: 11px; margin-bottom: 16px; color: #666;" id="sync-status"></div>
        <hr style="border: 0; border-top: 1px solid #ccc; margin-bottom: 16px;">
        <div class="livf-form-group">
            <label id="ui-language-label">UI Language</label>
            <select id="livf-ui-lang"></select>
        </div>
        <div class="livf-form-group">
            <label id="filter-languages-label">Filtering Languages</label>
            <div class="livf-checkbox-group" id="livf-filter-langs"></div>
        </div>
        <div class="livf-modal-actions">
            <span id="save-status">Saved! Reload page.</span>
            <button class="livf-btn livf-btn-primary" id="livf-save-btn">Save</button>
        </div>
        <div class="livf-footer">
            <a href="https://github.com/i-s-rusakov/job-seeking-mode-for-linkedin" target="_blank" rel="noopener noreferrer">View on GitHub</a>
        </div>
    </div>
    <script src="../shared.js"></script>
    <script src="popup.js"></script>
</body>
</html>
